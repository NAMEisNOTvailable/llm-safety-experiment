name: Export first 1500 annotation batch

on:
  workflow_dispatch:
  push:
    branches: [annotation-first-1500]
    paths:
      - ".github/workflows/export-first-1500.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify source files
        run: |
          test "$(wc -l < data/prompts/1500_Chinese_prompt.jsonl)" -eq 1500
          test "$(wc -l < data/results/glm3_results_Chinese.jsonl)" -eq 1500
      - name: Package source files
        run: |
          mkdir -p first-1500-source/data/prompts first-1500-source/data/results
          cp data/prompts/1500_Chinese_prompt.jsonl first-1500-source/data/prompts/
          cp data/results/glm3_results_Chinese.jsonl first-1500-source/data/results/
          cp docs/RESULTS_SUMMARY.md first-1500-source/ 2>/dev/null || true
      - name: Upload source batch
        uses: actions/upload-artifact@v4
        with:
          name: first-1500-source
          path: first-1500-source/
          if-no-files-found: error
          retention-days: 7
