name: Export GLM3 English 1500 annotation batch

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/export-glm3-english-1500.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify source files
        run: |
          test "$(wc -l < data/prompts/1500_English_prompt.jsonl)" -eq 1500
          test "$(wc -l < data/results/glm3_results_English.jsonl)" -eq 1500
      - name: Package source files
        run: |
          mkdir -p glm3-english-source/data/prompts glm3-english-source/data/results
          cp data/prompts/1500_English_prompt.jsonl glm3-english-source/data/prompts/
          cp data/results/glm3_results_English.jsonl glm3-english-source/data/results/
      - name: Upload source batch
        uses: actions/upload-artifact@v4
        with:
          name: glm3-english-source
          path: glm3-english-source/
          if-no-files-found: error
          retention-days: 7
