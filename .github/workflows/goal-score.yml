name: Goal-aware scoring

on:
  pull_request:

permissions:
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python scripts/zzz_goal_scores.py
      - uses: actions/upload-artifact@v4
        with:
          name: glm3-goal-aware-scores
          path: build/glm3_chinese_reasoned/nli_goal_scores.jsonl
          if-no-files-found: error
          retention-days: 7
