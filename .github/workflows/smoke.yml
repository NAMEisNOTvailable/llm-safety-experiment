name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run script smoke checks
        run: |
          python - <<'PY'
          import compileall
          import importlib.util
          from pathlib import Path

          scripts_dir = Path("scripts")
          if not compileall.compile_dir(scripts_dir, quiet=1):
              raise SystemExit("Python compile check failed for scripts/")

          skip = {"probe_nli.py", "z_capture_probe.py", "zz_probe_v2.py", "zz_all_scores.py"}
          for script in sorted(scripts_dir.glob("*.py")):
              if script.name in skip:
                  continue
              spec = importlib.util.spec_from_file_location(script.stem, script)
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)

          print("Script smoke checks passed.")
          PY

      - name: Validate dataset artefacts
        run: python scripts/validate_dataset.py

      - name: Export GLM3 Chinese reasoned labels
        run: |
          python scripts/export_glm3_chinese_reasoned.py \
            --prompts data/prompts/1500_Chinese_prompt.jsonl \
            --results data/results/glm3_results_Chinese.jsonl \
            --output-dir build/glm3_chinese_reasoned

      - name: Run full-set NLI scoring
        run: python scripts/zz_all_scores.py

      - name: Upload GLM3 Chinese reasoned labels
        uses: actions/upload-artifact@v4
        with:
          name: glm3-chinese-reasoned-labels
          path: build/glm3_chinese_reasoned/
          if-no-files-found: error
          retention-days: 7
